<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- floor-plan glyph: room outline with a door gap + interior wall -->
  <g stroke="#ffffff" stroke-width="58" fill="none" stroke-linecap="round">
    <!-- outer walls with a door gap on the south wall -->
    <path d="M 292 736 L 232 736 L 232 288 L 792 288 L 792 736 L 452 736"/>
    <!-- door leaf arc -->
    <path d="M 292 736 A 128 128 0 0 1 420 608" stroke-width="34"/>
    <!-- interior divider -->
    <path d="M 560 288 L 560 540"/>
  </g>
  <!-- furniture dot (bed) -->
  <rect x="614" y="560" width="132" height="130" rx="26" fill="#ffffff" opacity="0.92"/>
</svg>
